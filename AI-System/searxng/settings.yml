use_default_settings: true

general:
  instance_name: "LocalAI Research"
  debug: false

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  limiter: true
  image_proxy: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  pool_connections: 50
  pool_maxsize: 10
