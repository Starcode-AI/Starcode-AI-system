name: localai-control

services:
  app:
    build: .
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
      searxng:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite:////app/data/localai.db
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ALLOWED_HOSTS: localhost,127.0.0.1,app
      TRUSTED_ORIGINS: https://localhost:8443
      FORCE_HTTPS: "true"
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      SEARXNG_URL: http://searxng:8080
      UPLOAD_DIR: /app/data/uploads
      PROJECT_DIR: /app/data/projects
      BACKUP_DIR: /app/data/backups
      MAX_UPLOAD_GB: ${MAX_UPLOAD_GB:-5}
    volumes:
      - ./data:/app/data
    networks: [internal]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks: [internal]
    security_opt: [no-new-privileges:true]

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SEARXNG_SECRET in .env}
    networks: [internal]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [internal]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

networks:
  internal:
    internal: false

volumes:
  ollama-data:
  caddy-data:
  caddy-config:
